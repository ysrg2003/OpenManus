########################################
# LLM Configuration (Gemini Only)
########################################

[llm]
provider = "gemini"
model = "gemini-2.5-flash"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key = "ENV_GEMINI_API_KEY"
temperature = 0.0
max_tokens = 8096

########################################
# Vision / Multimodal (Optional)
########################################

[llm.vision]
model = "gemini-2.5-flash"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key = "ENV_GEMINI_API_KEY"
temperature = 0.0
max_tokens = 8192

########################################
# Disable Daytona Completely
########################################

[daytona]
enabled = false
api_key = ""
