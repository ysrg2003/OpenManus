name: Run OpenManus

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'The prompt for the OpenManus agent'
        required: true
        default: 'What is the capital of France?'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        # Install missing dependencies and fix version conflicts
        uv pip install structlog urllib3==1.26.15
        uv pip install -r requirements.txt

    - name: Install Playwright browsers
      run: | 
        source .venv/bin/activate
        playwright install chromium

    - name: Create config.toml
      run: |
        mkdir -p config
        cat <<EOF > config/config.toml
        [llm]
        model = "gemini-2.0-flash"
        base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
        api_key = "${{ secrets.GEMINI_API_KEY }}"
        max_tokens = 4096
        temperature = 0.0
        api_type = "openai"

        [llm.vision]
        model = "gemini-2.0-flash"
        base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
        api_key = "${{ secrets.GEMINI_API_KEY }}"

        [daytona]
        daytona_api_key = "dummy_key"
        EOF

    - name: Run OpenManus agent
      run: |
        source .venv/bin/activate
        python main.py --prompt "${{ github.event.inputs.prompt }}"
