name: Run OpenManus (manual) — Gemini

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Initial prompt to send to OpenManus (optional)'
        required: false
      gemini_model:
        description: 'Gemini model id (optional, overrides secret)'
        required: false

jobs:
  run-openmanus:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub-hosted runners max = 6 hours
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (repo) + google-genai
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # install official Gemini client (safe if repo already has it)
          pip install -q -U google-genai

      - name: Create config from secrets / inputs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p config
          MODEL="${{ github.event.inputs.gemini_model || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}"
          cat > config/config.toml <<'EOF'
          # OpenManus LLM config (auto-generated by GitHub Action)
          [llm]
          provider = "gemini"
          # model id: override using workflow input 'gemini_model' or repo secret 'GEMINI_MODEL'
          model = "${MODEL}"
          # For Gemini we include an explicit base_url / headers that the repo can use if generic REST client is used.
          base_url = "https://generativelanguage.googleapis.com/v1beta"
          # The workflow exports the API key as env var GEMINI_API_KEY (also stored in secrets).
          api_key = "${GEMINI_API_KEY}"
          # Optional tuning
          temperature = 0.0
          max_tokens = 4000
          EOF
          echo "Wrote config/config.toml (model=${MODEL})"
          # show head of file (without secrets)
          sed -n '1,120p' config/config.toml

      - name: Export GEMINI_API_KEY for runtime
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Exporting GEMINI_API_KEY for subsequent steps"
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> $GITHUB_ENV

      - name: Run OpenManus (attempt non-interactive)
        # Try a non-interactive run. Adjust the commands if your repo expects different entrypoints.
        run: |
          PROMPT="${{ github.event.inputs.prompt || '' }}"
          echo "Starting OpenManus (non-interactive attempt). Prompt length: ${#PROMPT}"
          # Try common entrypoints (main.py, run_flow.py, run_mcp.py). The repo may differ.
          # We try them in sequence; the first that exists will run.
          if [ -f main.py ]; then
            # some main.py accept args; if not, feeding the prompt via stdin as fallback
            python main.py --once --prompt "$PROMPT" || python main.py <<< "$PROMPT" || true
          elif [ -f run_flow.py ]; then
            python run_flow.py --once --prompt "$PROMPT" || python run_flow.py <<< "$PROMPT" || true
          elif [ -f run_mcp.py ]; then
            python run_mcp.py --once --prompt "$PROMPT" || python run_mcp.py <<< "$PROMPT" || true
          else
            echo "No recognized entrypoint (main.py / run_flow.py / run_mcp.py) found — adjust the workflow to call the correct script."
            exit 0
          fi
        # keep job success even if script returns non-zero; logs will help debugging
        continue-on-error: true

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanus-artifacts
          path: |
            ./openmanus.out
            ./openmanus.log
            ./logs
            config/config.toml
          retention-days: 7
