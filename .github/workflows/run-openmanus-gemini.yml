name: Run OpenManus (manual) — Gemini

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Initial prompt to send to OpenManus (optional)'
        required: false
      gemini_model:
        description: 'Gemini model id (optional, overrides secret)'
        required: false

permissions:
  contents: read
  actions: write

jobs:
  run-openmanus:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub-hosted runners max = 6 hours
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps for Pillow + Install dependencies (robust)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          sudo apt-get update -y

          # system packages needed to build pillow wheels if binary wheel not available
          sudo apt-get install -y build-essential libjpeg-dev zlib1g-dev libtiff5-dev libopenjp2-7-dev libpng-dev

          # prepare constraint that forces pillow 10.4.x (satisfies crawl4ai dependency)
          echo "pillow==10.4.0" > constraints.txt

          if [ -f requirements.txt ]; then
            # backup original
            cp requirements.txt requirements.txt.bak || true

            # If requirements pins pillow (e.g. pillow~=11.1.0) remove that line so constraints can control it
            if grep -i -E '^\s*pillow' requirements.txt >/dev/null 2>&1; then
              echo "Detected top-level pillow pin in requirements.txt — removing it and letting constraints.txt force 10.4.x"
              grep -vi -E '^\s*pillow' requirements.txt > requirements_no_pillow.txt || true
            else
              cp requirements.txt requirements_no_pillow.txt
            fi

            # First try: normal install with constraints (preferred)
            echo "Attempting to install requirements with constraints (preferred)"
            if pip install -r requirements_no_pillow.txt -c constraints.txt; then
              echo "Installed requirements with pillow constrained to 10.4.x"
            else
              echo "::warning::Install with constraints failed — attempting fallback strategy"

              # Fallback strategy:
              # 1) Try to install crawl4ai without pulling its deps (avoid it forcing pillow 11.x)
              # 2) Install the rest of requirements with constraints
              # 3) Force-reinstall pillow 10.4.0
              #
              # WARNING: Using --no-deps can break runtime if crawl4ai needs other deps.
              pip install --no-deps crawl4ai==0.6.3 || true

              pip install -r requirements_no_pillow.txt -c constraints.txt || true

              pip install --force-reinstall pillow==10.4.0 || true

              echo "::warning::Fallback install finished — verify runtime behaviour (crawl4ai may require specific deps)."
            fi
          else
            echo "No requirements.txt found — skipping requirements install"
          fi

          # always ensure google-genai installed for Gemini quickcalls
          pip install -q -U google-genai

      - name: Create config/config.toml from GitHub Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_INPUT: ${{ github.event.inputs.gemini_model }}
          GEMINI_MODEL_SECRET: ${{ secrets.GEMINI_MODEL }}
          GEMINI_VISION_MODEL_SECRET: ${{ secrets.GEMINI_VISION_MODEL }}
        run: |
          # determine model names (input -> secret -> default)
          MODEL="${GEMINI_MODEL_INPUT:-${GEMINI_MODEL_SECRET:-gemini-2.5-flash}}"
          VISION_MODEL="${GEMINI_VISION_MODEL_SECRET:-gemini-2.5-flash-image}"
          mkdir -p config
          cat > config/config.toml <<EOF
          # Global LLM configuration
          [llm]
          provider = "gemini"
          model = "${MODEL}"
          base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
          api_key = "${GEMINI_API_KEY}"
          temperature = 0.0
          max_tokens = 8096

          # Optional configuration for Google vision / multimodal models
          [llm.vision]
          model = "${VISION_MODEL}"
          base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
          api_key = "${GEMINI_API_KEY}"
          max_tokens = 8192
          temperature = 0.0
          EOF

          echo "config/config.toml created (model=${MODEL})"
          # show file head but redact api_key value to avoid leaking secret in logs
          sed -n '1,120p' config/config.toml | sed -E 's/(api_key = )".*"/\1"<redacted>"/g' || true

      - name: Export GEMINI_API_KEY for runtime
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Exporting GEMINI_API_KEY for subsequent steps"
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> $GITHUB_ENV

      - name: Run OpenManus (attempt non-interactive)
        continue-on-error: true
        run: |
          PROMPT="${{ github.event.inputs.prompt || '' }}"
          echo "Starting OpenManus (non-interactive attempt). Prompt length: ${#PROMPT}"
          # Try common entrypoints (main.py, run_flow.py, run_mcp.py). The repo may differ.
          if [ -f main.py ]; then
            python main.py --once --prompt "$PROMPT" || python main.py <<< "$PROMPT" || true
          elif [ -f run_flow.py ]; then
            python run_flow.py --once --prompt "$PROMPT" || python run_flow.py <<< "$PROMPT" || true
          elif [ -f run_mcp.py ]; then
            python run_mcp.py --once --prompt "$PROMPT" || python run_mcp.py <<< "$PROMPT" || true
          else
            echo "No recognized entrypoint (main.py / run_flow.py / run_mcp.py) found — adjust the workflow to call the correct script."
            exit 0
          fi

      - name: Collect environment + Python info (debug)
        if: failure()
        run: |
          echo "=== python info ==="
          python -V || true
          pip freeze || true
          echo "=== disk usage ==="
          df -h || true
          echo "=== ls repo root ==="
          ls -la || true

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanus-artifacts
          path: |
            ./openmanus.out
            ./openmanus.log
            ./logs
            config/config.toml
            constraints.txt
          retention-days: 7
