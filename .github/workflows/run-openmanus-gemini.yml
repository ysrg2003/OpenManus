name: Run OpenManus (manual) — Gemini

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Initial prompt to send to OpenManus (optional)'
        required: false
      gemini_model:
        description: 'Gemini model id (optional, overrides secret)'
        required: false

permissions:
  contents: read

jobs:
  run-openmanus:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python + Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps + dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          sudo apt-get update -y
          sudo apt-get install -y build-essential libjpeg-dev zlib1g-dev libpng-dev

          # force pillow 10.4 for crawl4ai
          echo "pillow==10.4.0" > constraints.txt

          if [ -f requirements.txt ]; then
            grep -vi '^pillow' requirements.txt > req.txt || true
            pip install -r req.txt -c constraints.txt
          fi

          pip install -U google-genai

      - name: Create config/config.toml (Gemini + disable Daytona)
        env:
          GEMINI_MODEL_INPUT: ${{ github.event.inputs.gemini_model }}
        run: |
          MODEL="${GEMINI_MODEL_INPUT:-gemini-2.5-flash}"
          mkdir -p config

          cat > config/config.toml <<EOF
[llm]
provider = "gemini"
model = "${MODEL}"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key = "${GEMINI_API_KEY}"
temperature = 0.0
max_tokens = 8096

[llm.vision]
model = "gemini-2.5-flash-image"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key = "${GEMINI_API_KEY}"
max_tokens = 8192
temperature = 0.0

[daytona]
enabled = false
api_key = ""
EOF

          echo "config/config.toml created (model=${MODEL})"
          sed -n '1,50p' config/config.toml | sed -E 's/(api_key = )".*"/\1"<redacted>"/g' || true

      - name: Run OpenManus
        continue-on-error: true
        run: |
          PROMPT="${{ github.event.inputs.prompt || '' }}"
          echo "Prompt length: ${#PROMPT}"

          if [ -f main.py ]; then
            python main.py --once --prompt "$PROMPT" || python main.py <<< "$PROMPT"
          elif [ -f run_flow.py ]; then
            python run_flow.py --once --prompt "$PROMPT" || python run_flow.py <<< "$PROMPT"
          elif [ -f run_mcp.py ]; then
            python run_mcp.py --once --prompt "$PROMPT" || python run_mcp.py <<< "$PROMPT"
          else
            echo "No recognized entrypoint found (main.py/run_flow.py/run_mcp.py)"
            exit 0
          fi

      - name: Collect debug info if failed
        if: failure()
        run: |
          echo "=== Python version ==="
          python -V || true
          echo "=== Pip freeze ==="
          pip freeze || true
          echo "=== Disk usage ==="
          df -h || true
          echo "=== Repo files ==="
          ls -la || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanus-artifacts
          path: |
            ./logs
            config/config.toml
            constraints.txt
          retention-days: 7
