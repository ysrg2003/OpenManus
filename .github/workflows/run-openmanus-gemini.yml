name: Run OpenManus (manual) — Gemini

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Initial prompt to send to OpenManus (optional)'
        required: false
      gemini_model:
        description: 'Gemini model id (optional, overrides secret)'
        required: false

permissions:
  contents: read

jobs:
  run-openmanus:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # ✅ IMPORTANT — expose secrets BEFORE python starts
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Setup Python + Cache
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ Install dependencies cleanly
      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          sudo apt-get update -y
          sudo apt-get install -y build-essential libjpeg-dev zlib1g-dev libpng-dev

          # Force pillow version compatible with crawl4ai
          echo "pillow==10.4.0" > constraints.txt

          if [ -f requirements.txt ]; then
            grep -vi '^pillow' requirements.txt > req.txt || true
            pip install -r req.txt -c constraints.txt
          fi

          pip install -U google-genai

      # ✅ Create config file (Gemini 2.5 Flash)
      - name: Create config/config.toml
        env:
          GEMINI_MODEL_INPUT: ${{ github.event.inputs.gemini_model }}
        run: |
          MODEL="${GEMINI_MODEL_INPUT:-gemini-2.5-flash}"

          mkdir -p config

          cat > config/config.toml <<EOF
          [llm]
          provider = "gemini"
          model = "${MODEL}"
          base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
          api_key = "${GEMINI_API_KEY}"
          temperature = 0.0
          max_tokens = 8096

          [llm.vision]
          model = "gemini-2.5-flash"
          base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
          api_key = "${GEMINI_API_KEY}"
          max_tokens = 8192
          temperature = 0.0
          EOF

          echo "Config created using model: ${MODEL}"

      # ✅ Run OpenManus
      - name: Run OpenManus
        run: |
          PROMPT="${{ github.event.inputs.prompt || '' }}"
          echo "Prompt length: ${#PROMPT}"

          if [ -f main.py ]; then
            python main.py --once --prompt "$PROMPT" || python main.py <<< "$PROMPT"
          else
            echo "main.py not found"
          fi

      # ✅ Upload artifacts
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openmanus-artifacts
          path: |
            ./logs
            config/config.toml
            constraints.txt
          retention-days: 7
